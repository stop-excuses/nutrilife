name: Weekly Scraper

on:
  schedule:
    # Every Monday and Thursday at 06:00 UTC (08:00 Sofia time)
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 4"
  workflow_dispatch: # allow manual run from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run scraper
        run: |
          cd scraper
          python scraper.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Validate scraper output
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("data/offers.json", encoding="utf-8") as f:
              data = json.load(f)
          total = data.get("total_offers", 0)
          stores = data.get("stores", [])
          print(f"Offers: {total} | Stores: {stores}")
          if total < 200:
              print(f"ERROR: only {total} offers — scraper likely failed. Aborting commit.")
              sys.exit(1)
          if len(stores) < 2:
              print(f"ERROR: only {len(stores)} store(s) scraped. Aborting commit.")
              sys.exit(1)
          print("Validation passed.")
          EOF

      - name: Sync offers.json → offers.js
        run: python sync_offers.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offers.json data/offers.js data/all_products.json data/all_products.js scraper/scraper_stats.json
          git diff --cached --quiet || git commit -m "chore: weekly offers update $(date -u '+%Y-%m-%d')"
          git push
