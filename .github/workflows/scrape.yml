name: Weekly Scrape — NutriLife Offers

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit updated offers
        run: |
          git config user.name "NutriLife Bot"
          git config user.email "bot@nutrilife.bg"
          git add data/offers.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update weekly offers — $(date +%Y-%m-%d)"
            git push
          fi