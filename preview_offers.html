    <script>
        const dataStr = document.getElementById('raw-data').textContent;
        const data = JSON.parse(dataStr);
        const list = document.getElementById('list');
        const stats = document.getElementById('stats-summary');

        // Render Stats
        stats.innerHTML = `
            <div class="stat-card"><div class="stat-val">${data.total_offers}</div><div class="stat-label">Промоции</div></div>
            <div class="stat-card"><div class="stat-val">${data.stores.length}</div><div class="stat-label">Магазина</div></div>
            <div class="stat-card"><div class="stat-val">${data.offers.filter(o => o.is_healthy).length}</div><div class="stat-label">Здравословни</div></div>
        `;

        // Render Cards (top 25)
        data.offers.slice(0, 25).forEach(o => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${o.image}" onerror="this.src='https://via.placeholder.com/90?text=No+Img'">
                <div class="content">
                    <span class="score" style="background:${o.health_score >= 8 ? '#c8e6c9' : '#fff9c4'}">
                        Score: ${o.health_score}/10
                    </span>
                    <h3 class="title">${o.emoji} ${o.name}</h3>
                    <div class="store">${o.store} ${o.valid_until ? '• валидна до ' + o.valid_until : ''}</div>
                    <div class="price-row">
                        <span class="price">${o.new_price.toFixed(2)} лв</span>
                        ${o.old_price ? '<span class="old-price">' + o.old_price.toFixed(2) + ' лв</span>' : ''}
                    </div>
                    <div class="tags">
                        ${o.diet_tags.map(t => '<span class="tag">'+t+'</span>').join('')}
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    </script>
